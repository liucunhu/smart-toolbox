version: '3.8'

services:
  # ------------------------------------------------------------------
  # MySQL 8.0 数据库服务
  # ------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: smart-toolbox-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-SmartToolbox@2026}
      MYSQL_DATABASE: smart_toolbox
      MYSQL_USER: ${MYSQL_USER:-toolbox_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ToolboxPass123}
      TZ: Asia/Shanghai
      MYSQL_INNODB_BUFFER_POOL_SIZE: 128M
    ports:
      - "3306:3306"  # 将本地 3307 映射到容器 3306，避免冲突
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d  # 挂载自定义配置
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
      - --innodb_buffer_pool_size=128M
      - --binlog_expire_logs_seconds=604800
    networks:
      - toolbox-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # Redis 7.0 缓存与消息队列服务
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: smart-toolbox-redis
    restart: always
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-RedisPass123}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    networks:
      - toolbox-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-RedisPass123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data_v2:
    driver: local
  redis_data:
    driver: local

networks:
  toolbox-net:
    driver: bridge
